name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # DEBUG JOB: Investigating AMD AVX SIGILL issue (https://github.com/maplibre/maplibre-tile-spec/issues/1016)
  # This job runs ONLY the failing fastpfor test with maximum debug info.
  # Remove this job once the issue is resolved.
  debug-amd-avx:
    name: Debug AMD AVX Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/mlt-setup-rust
      - run: just -v rust::ci-env-info
      - name: Install debug tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb
      - name: Run debug test for AMD AVX issue
        id: debug_test
        continue-on-error: true
        run: just -v rust::ci-debug-amd-avx
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: amd-avx-debug-artifacts
          path: rust/target/amd-avx-debug/
          retention-days: 30
      - name: Fail if test failed
        if: steps.debug_test.outcome == 'failure'
        run: |
          echo "::error::Debug test failed - check uploaded artifacts for details"
          exit 1
